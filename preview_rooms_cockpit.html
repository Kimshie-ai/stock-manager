<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview Rooms Cockpit - FM DDP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { dark: { bg: '#050505', card: '#121212', border: '#222222' } } } }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.5s ease; }
        .telkom-gradient {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(238, 30, 36, 0.03) 0%, transparent 70%);
            z-index: -1;
        }
        .dark .telkom-gradient { background: radial-gradient(circle at 50% 50%, rgba(238, 30, 36, 0.08) 0%, transparent 70%); }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0, 0, 0, 0.04); }
        .dark .glass-nav { background: rgba(18, 18, 18, 0.8); border-color: rgba(255, 255, 255, 0.05); }
        .bento-card {
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.04); border-radius: 2.5rem;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .dark .bento-card { background: rgba(18, 18, 18, 0.8); border-color: rgba(255, 255, 255, 0.05); }
        .bento-card:hover { transform: translateY(-5px); border-color: #EE1E24; box-shadow: 0 25px 50px -12px rgba(238, 30, 36, 0.1); }
        .glow-text-red { background: linear-gradient(135deg, #EE1E24 0%, #B91C1C 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen bg-[#FDFDFD] text-[#0F172A] dark:bg-[#050505] dark:text-white">
    <div class="telkom-gradient"></div>
    
    <!-- Navigation -->
    <nav class="glass-nav sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="index.html" class="w-10 h-10 rounded-xl bg-white dark:bg-white/5 border border-slate-100 dark:border-white/5 flex items-center justify-center shadow-sm hover:scale-110 transition-all">
                    <i class="fa-solid fa-house-chimney text-[#EE1E24] text-xs"></i>
                </a>
                <h1 class="text-xl font-black italic tracking-tighter uppercase">ROOM <span class="glow-text-red">BOOKING</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <div id="clock" class="text-xs font-black italic tracking-widest text-slate-400">00:00 WIB</div>
                <button onclick="toggleDarkMode()" class="w-10 h-10 rounded-xl bg-white dark:bg-white/5 border border-slate-100 dark:border-white/5 flex items-center justify-center shadow-sm">
                    <i id="theme-icon" class="fa-solid fa-moon text-[#EE1E24] text-xs"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 md:p-12">
        <header class="mb-16">
            <h2 class="text-4xl md:text-6xl font-black tracking-tighter uppercase italic mb-4">Pesan <span class="glow-text-red">Ruangan</span></h2>
            <p class="text-xs font-bold text-slate-400 uppercase tracking-[0.4em] italic">Witel OPMC • Reservasi Cepat & Akurat</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Room Card Example -->
            <div class="bento-card p-8 group">
                <div class="h-48 rounded-[2rem] overflow-hidden mb-6 relative bg-slate-100 dark:bg-white/5">
                    <img src="https://lh7-rt.googleusercontent.com/formsz/AN7BsVDpuJfxEMOP9ytsaI7jdxZsZJTGpO7Dnpxbe_Zy2pRkOwasCWkrFN1pehc4qWzCXHb7BfVpntePwdR5EeNZDcJ6EwU5GizbpAn6ZYVSoPRPJfQ3pNtTEtymODhYNQzFVaoPN4z1HnfjHclGcR7gzdilGBjFf4-XIx3fN2IyfTiJLBTE7Ja_A5J_ke0T1rrs0xM3HfySBnOV4RaQ=w600" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700 opacity-80 group-hover:opacity-100">
                    <div class="absolute top-4 left-4 bg-[#EE1E24] px-4 py-1.5 rounded-xl text-[9px] font-black uppercase tracking-widest text-white shadow-lg">Lantai 2</div>
                </div>
                <h3 class="text-xl font-black mb-1 tracking-tight italic uppercase">Ruang Collaboration</h3>
                <p class="text-slate-500 dark:text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-8 flex items-center">
                    <i class="fa-solid fa-users mr-2 text-[#EE1E24]"></i> Kapasitas 40 Orang
                </p>
                <button class="w-full bg-slate-900 text-white dark:bg-white dark:text-black text-[10px] font-black uppercase py-4 rounded-2xl transition-all tracking-widest hover:bg-[#EE1E24] dark:hover:bg-[#EE1E24] dark:hover:text-white pt-5">Pilih Ruangan</button>
            </div>
            
            <!-- Repeat cards... -->
        </div>
    </main>

    <script>
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            const icon = document.getElementById('theme-icon');
            if (isDark) icon.classList.replace('fa-moon', 'fa-sun');
            else icon.classList.replace('fa-sun', 'fa-moon');
        }
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', hour12: false }) + ' WIB';
        }
        setInterval(updateClock, 1000); updateClock();
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            document.getElementById('theme-icon')?.classList.replace('fa-moon', 'fa-sun');
        }
    </script>
</body>
</html>
