<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kimshie Office - Management Suite</title>
    <link rel="icon" type="image/png" href="assets/branding/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            bg: '#0F172A',
                            paper: 'rgba(30, 41, 59, 0.7)',
                            border: '#334155',
                            text: '#F1F5F9',
                            muted: '#94A3B8'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.3s, color 0.3s; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .dark .glass { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255, 255, 255, 0.1); }
        .bg-paper-gradient { background: linear-gradient(135deg, #0056B3 0%, #002D5E 100%); }
        .spring-hover { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .spring-hover:hover { transform: translateY(-4px) scale(1.02); }
        .status-badge-tersedia, .status-badge-selesai { background-color: #ecfdf5; color: #059669; border: 1px solid #d1fae5; }
        .status-badge-dipakai, .status-badge-diproses { background-color: #eff6ff; color: #2563eb; border: 1px solid #dbeafe; }
        .status-badge-rusak, .status-badge-darurat { background-color: #fef2f2; color: #dc2626; border: 1px solid #fee2e2; }
        .status-badge-hilang, .status-badge-menunggu { background-color: #fef3c7; color: #d97706; border: 1px solid #fef3c7; }
        #toast-container { position: fixed; top: 1.5rem; right: 1.5rem; z-index: 200; display: flex; flex-direction: column; gap: 0.75rem; }
        .toast { animation: slideIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .tab-active { color: #3b82f6; border-bottom: 3px solid #3b82f6; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-dark-bg dark:text-dark-text min-h-screen">
    <div id="toast-container"></div>

    <!-- Navigation -->
    <nav class="glass sticky top-0 z-50 shadow-sm border-b border-white/20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 relative">
                        <img src="assets/branding/icon-black.png" alt="Logo" class="absolute inset-0 w-full h-full object-contain dark:opacity-0 transition-opacity duration-300">
                        <img src="assets/branding/icon-white.png" alt="Logo" class="absolute inset-0 w-full h-full object-contain opacity-0 dark:opacity-100 transition-opacity duration-300">
                    </div>
                    <span class="text-xl font-extrabold tracking-tight text-slate-900 dark:text-white">Kimshie<span class="text-blue-600">Office</span></span>
                </div>
                <div class="hidden md:flex space-x-8 text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">
                    <button onclick="switchModule('assets')" id="nav-assets" class="tab-active py-5">Aset Barang</button>
                    <button onclick="switchModule('tickets')" id="nav-tickets" class="py-5">Lapor Keluhan</button>
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="toggleDarkMode()" class="p-2.5 rounded-xl bg-white/50 dark:bg-slate-800/50 text-slate-600 dark:text-dark-muted border border-slate-200 dark:border-slate-700 hover:text-blue-600 transition-all">
                        <i id="darkIcon" class="fa-solid fa-moon"></i>
                    </button>
                    <div id="authSection">
                        <button id="loginBtn" onclick="toggleAuthModal()" class="text-xs font-bold text-slate-600 dark:text-dark-muted uppercase border border-slate-200 dark:border-dark-border px-4 py-2 rounded-xl bg-white dark:bg-slate-800">Login</button>
                        <div id="userProfile" class="hidden flex items-center space-x-3">
                            <div class="w-8 h-8 rounded-full bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center text-blue-600 font-bold text-xs" id="userInitial">A</div>
                            <button onclick="handleLogout()" class="text-xs font-bold text-red-500 hover:text-red-700 transition uppercase">Logout</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Header Module Assets -->
    <header id="header-assets" class="bg-paper-gradient py-16 text-white relative overflow-hidden">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-8">
                <div>
                    <h1 class="text-4xl md:text-5xl font-black mb-3 tracking-tight text-white">Dashboard Aset</h1>
                    <p class="text-blue-100/80 text-lg font-medium">Kelola inventaris kantor dengan cerdas. 📂✨</p>
                </div>
                <div class="bg-white/10 backdrop-blur-md p-6 rounded-3xl border border-white/10 w-full md:w-80">
                    <canvas id="stockChart" height="150"></canvas>
                </div>
            </div>
        </div>
    </header>

    <!-- Header Module Tickets -->
    <header id="header-tickets" class="hidden bg-slate-900 py-16 text-white relative overflow-hidden">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
            <h1 class="text-4xl md:text-5xl font-black mb-3 tracking-tight text-white">Ticketing System</h1>
            <p class="text-slate-400 text-lg font-medium text-white">Lapor keluhan & perbaikan fasilitas kantor. 🛠️</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 -mt-10 pb-24 relative z-20">
        <!-- Module: Assets -->
        <section id="module-assets">
            <!-- Stats & Table existing from previous version -->
            <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
                <!-- Stats markup same as before... -->
                <div class="bg-white dark:bg-slate-800 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-700 p-6 flex flex-col items-center justify-center text-center spring-hover">
                    <p class="text-[10px] text-slate-400 uppercase font-extrabold tracking-widest mb-2">Total</p>
                    <p id="statTotalItems" class="text-3xl font-black text-slate-800 dark:text-white">0</p>
                </div>
                <div class="bg-white dark:bg-slate-800 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-700 p-6 flex flex-col items-center justify-center text-center border-b-4 border-b-emerald-500 spring-hover">
                    <p class="text-[10px] text-emerald-600 uppercase font-extrabold tracking-widest mb-2">Tersedia</p>
                    <p id="statTersedia" class="text-3xl font-black text-slate-800 dark:text-white">0</p>
                </div>
                <!-- ... other asset stats ... -->
            </div>
            <!-- Toolbar & Content Container existing ... -->
        </section>

        <!-- Module: Tickets -->
        <section id="module-tickets" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white dark:bg-slate-800 p-8 rounded-[2rem] shadow-xl border border-slate-100 dark:border-slate-700 flex items-center gap-6">
                    <div class="w-16 h-16 bg-amber-100 text-amber-600 rounded-2xl flex items-center justify-center text-2xl"><i class="fa-solid fa-clock"></i></div>
                    <div><p class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Menunggu</p><p id="ticketStatWait" class="text-3xl font-black">0</p></div>
                </div>
                <div class="bg-white dark:bg-slate-800 p-8 rounded-[2rem] shadow-xl border border-slate-100 dark:border-slate-700 flex items-center gap-6">
                    <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center text-2xl"><i class="fa-solid fa-screwdriver-wrench"></i></div>
                    <div><p class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Diproses</p><p id="ticketStatProcess" class="text-3xl font-black">0</p></div>
                </div>
                <div class="bg-white dark:bg-slate-800 p-8 rounded-[2rem] shadow-xl border border-slate-100 dark:border-slate-700 flex items-center gap-6">
                    <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center text-2xl"><i class="fa-solid fa-circle-check"></i></div>
                    <div><p class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Selesai</p><p id="ticketStatDone" class="text-3xl font-black">0</p></div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
                <!-- Form Ticketing -->
                <div class="lg:col-span-1">
                    <div class="bg-white dark:bg-slate-800 p-8 rounded-[2.5rem] shadow-2xl border border-slate-100 dark:border-slate-700 sticky top-32">
                        <h2 class="text-xl font-black text-slate-900 dark:text-white mb-6">Buat Laporan Baru</h2>
                        <form id="addTicketForm" onsubmit="handleTicketSubmit(event)" class="space-y-5">
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Subjek Masalah</label>
                                <input type="text" id="ticketSubject" required placeholder="Contoh: AC Bocor" class="w-full px-5 py-3.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none focus:ring-4 focus:ring-blue-500/10 font-semibold dark:text-white">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Lokasi Fasilitas</label>
                                <select id="ticketLocation" required class="w-full px-5 py-3.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none appearance-none font-semibold dark:text-white">
                                    <option value="">Pilih Lokasi...</option>
                                    <option>Ruang Kerja Utama</option>
                                    <option>Pantry / Dapur</option>
                                    <option>Kamar Mandi</option>
                                    <option>Area Parkir</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Tingkat Urgensi</label>
                                <div class="flex gap-2">
                                    <button type="button" onclick="setUrgensi('NORMAL')" id="btnUrgensiNormal" class="flex-1 py-2 text-[10px] font-black rounded-xl border-2 border-slate-200 bg-slate-50 text-slate-400">NORMAL</button>
                                    <button type="button" onclick="setUrgensi('DARURAT')" id="btnUrgensiDarurat" class="flex-1 py-2 text-[10px] font-black rounded-xl border-2 border-slate-200 bg-slate-50 text-slate-400">DARURAT</button>
                                </div>
                            </div>
                            <button type="submit" id="ticketSubmitBtn" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl shadow-blue-500/20 hover:bg-blue-700 transition-all uppercase tracking-widest text-xs pt-6">Kirim Laporan</button>
                        </form>
                    </div>
                </div>
                <!-- List Ticketing -->
                <div class="lg:col-span-2 space-y-6" id="ticketList">
                    <!-- Tickets will be rendered here -->
                </div>
            </div>
        </section>
    </main>

    <!-- Existing Auth, Modals, Footer existing ... -->

    <script>
        // ... (Existing Supabase & Auth logic) ...
        
        let activeModule = 'assets';
        let ticketUrgensi = 'NORMAL';

        function switchModule(mod) {
            activeModule = mod;
            document.getElementById('module-assets').classList.toggle('hidden', mod !== 'assets');
            document.getElementById('header-assets').classList.toggle('hidden', mod !== 'assets');
            document.getElementById('module-tickets').classList.toggle('hidden', mod !== 'tickets');
            document.getElementById('header-tickets').classList.toggle('hidden', mod !== 'tickets');
            
            document.getElementById('nav-assets').classList.toggle('tab-active', mod === 'assets');
            document.getElementById('nav-tickets').classList.toggle('tab-active', mod === 'tickets');
            
            if (mod === 'tickets') fetchTickets();
        }

        function setUrgensi(val) {
            ticketUrgensi = val;
            const btnNormal = document.getElementById('btnUrgensiNormal');
            const btnDarurat = document.getElementById('btnUrgensiDarurat');
            
            if (val === 'DARURAT') {
                btnDarurat.className = "flex-1 py-2 text-[10px] font-black rounded-xl border-2 border-red-500 bg-red-50 text-red-600";
                btnNormal.className = "flex-1 py-2 text-[10px] font-black rounded-xl border-2 border-slate-200 bg-slate-50 text-slate-400";
            } else {
                btnNormal.className = "flex-1 py-2 text-[10px] font-black rounded-xl border-2 border-blue-500 bg-blue-50 text-blue-600";
                btnDarurat.className = "flex-1 py-2 text-[10px] font-black rounded-xl border-2 border-slate-200 bg-slate-50 text-slate-400";
            }
        }

        // Integration Note: 
        // Need to create 'office_tickets' table in Supabase.
        async function fetchTickets() {
            const list = document.getElementById('ticketList');
            list.innerHTML = '<div class="text-center py-12 text-slate-400 italic">Memuat daftar keluhan...</div>';
            
            // Logic to fetch from Supabase 'office_tickets' table
            // For now, mockup rendering
            const mockup = [
                { id: 'OFF-092', subject: 'AC Bocor di Ruang Meeting', location: 'Ruang Meeting 1', status: 'MENUNGGU', created_at: new Date() }
            ];
            renderTickets(mockup);
        }

        function renderTickets(tickets) {
            const list = document.getElementById('ticketList');
            list.innerHTML = tickets.map(t => `
                <div class="bg-white dark:bg-slate-800 p-6 rounded-[2rem] shadow-lg border border-slate-100 dark:border-slate-700 flex gap-6 spring-hover">
                    <div class="w-24 h-24 bg-slate-100 dark:bg-slate-900 rounded-2xl overflow-hidden flex-shrink-0 flex items-center justify-center">
                        <i class="fa-solid fa-wrench text-3xl opacity-20"></i>
                    </div>
                    <div class="flex-1">
                        <div class="flex justify-between items-start mb-2">
                            <span class="px-3 py-1 bg-amber-100 text-amber-600 text-[9px] font-black rounded-full uppercase tracking-widest">${t.status}</span>
                            <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">ID: #${t.id}</span>
                        </div>
                        <h3 class="text-lg font-black text-slate-800 dark:text-white mb-1">${t.subject}</h3>
                        <p class="text-xs text-slate-500 dark:text-dark-muted font-semibold mb-4"><i class="fa-solid fa-location-dot text-blue-500 mr-1.5"></i>${t.location}</p>
                    </div>
                </div>
            `).join('');
        }

        // Handle ticket submission
        async function handleTicketSubmit(e) {
            e.preventDefault();
            showToast("Fitur pengiriman tiket sedang dihubungkan ke Database...", "info");
        }
    </script>
</body>
</html>
