<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tickets - Office Manager</title>
    <link rel="icon" type="image/png" href="assets/branding/favicon-k.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#0056B3', dark: { bg: '#050505', card: '#121212', border: '#222222' } },
                    borderRadius: { 'premium': '1.5rem', 'super-premium': '2.5rem' }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.4s ease; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .dark .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); }
        .hero-gradient { background: radial-gradient(circle at 50% 50%, #0056B3 0%, transparent 70%); opacity: 0.08; position: fixed; width: 100vw; height: 100vh; z-index: -1; }
        .dark .hero-gradient { opacity: 0.15; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-premium { animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 dark:bg-[#050505] dark:text-white">
    <div class="hero-gradient"></div>
    
    <nav class="glass sticky top-0 z-50 border-b border-slate-200 dark:border-white/5 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 md:px-6">
            <div class="flex justify-between h-16 md:h-20 items-center">
                <a href="index.html" class="flex items-center space-x-2 md:space-x-4">
                    <img src="assets/branding/logo-k-refined.png" alt="Logo" class="h-8 md:h-10 w-auto">
                    <span class="text-lg md:text-xl font-extrabold tracking-tighter uppercase">Office<span class="text-primary">Manager</span></span>
                </a>
                <button onclick="toggleDarkMode()" class="w-10 h-10 rounded-xl flex items-center justify-center hover:bg-slate-200 dark:hover:bg-white/5 transition-all">
                    <i id="themeIcon" class="fa-solid fa-moon"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 md:px-6 py-12 md:py-20 animate-premium">
        <div class="text-center mb-12 md:mb-20">
            <h1 class="text-4xl md:text-6xl font-black tracking-tighter mb-4">Emergency Hub</h1>
            <p class="text-slate-500 dark:text-slate-400 text-base md:text-lg">Layanan pengaduan cepat untuk kendala operasional kantor.</p>
        </div>

        <div class="max-w-3xl mx-auto glass p-8 md:p-12 rounded-[2rem] md:rounded-super-premium border-t-4 border-t-amber-500 shadow-2xl">
            <form id="ticketForm" class="space-y-6 md:space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4">Subjek Kendala</label>
                        <input type="text" id="subject" required placeholder="Contoh: AC Mati" class="w-full px-6 py-4 bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl font-bold focus:border-amber-500 outline-none transition-all">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4">Lokasi</label>
                        <input type="text" id="location" required placeholder="Contoh: Lantai 7" class="w-full px-6 py-4 bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl font-bold focus:border-amber-500 outline-none transition-all">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4">Prioritas</label>
                    <select id="priority" class="w-full px-6 py-4 bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl font-bold focus:border-amber-500 outline-none transition-all">
                        <option value="BIASA" class="dark:bg-dark-card">Biasa</option>
                        <option value="DARURAT" class="dark:bg-dark-card">Darurat</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-amber-500 text-white font-black py-5 md:py-6 rounded-2xl shadow-xl shadow-amber-500/20 hover:bg-amber-600 transition-all uppercase tracking-widest text-xs pt-7 md:pt-8">Kirim Laporan</button>
            </form>
        </div>
    </main>

    <script>
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            const icon = document.getElementById('themeIcon');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
        }
        // Supabase integration placeholder
    </script>
</body>
</html>
