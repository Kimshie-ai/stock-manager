<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tickets - Office Manager</title>
    <link rel="icon" type="image/png" href="assets/branding/favicon-k.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#0056B3', dark: { bg: '#050505', card: '#121212', border: '#222222' } },
                    borderRadius: { 'premium': '1.5rem', 'super-premium': '2.5rem' }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.4s ease; -webkit-font-smoothing: antialiased; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .dark .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); }
        .hero-gradient { background: radial-gradient(circle at 50% 50%, #0056B3 0%, transparent 70%); opacity: 0.08; position: fixed; width: 100vw; height: 100vh; z-index: -1; }
        .dark .hero-gradient { opacity: 0.15; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-premium { animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .badge { @apply px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest border; }
        .badge-menunggu { @apply bg-amber-50 text-amber-600 border-amber-100; }
        .badge-diproses { @apply bg-blue-50 text-blue-600 border-blue-100; }
        .badge-selesai { @apply bg-emerald-50 text-emerald-600 border-emerald-100; }
    </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 dark:bg-[#050505] dark:text-white">
    <div class="hero-gradient"></div>
    <div id="toast-container" class="fixed top-6 right-6 z-[200] flex flex-col gap-3"></div>
    
    <nav class="glass sticky top-0 z-50 border-b border-slate-200 dark:border-white/5 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 md:px-6">
            <div class="flex justify-between h-16 md:h-20 items-center">
                <a href="index.html" class="flex items-center space-x-2 md:space-x-4">
                    <img src="assets/branding/logo-k-refined.png" alt="Logo" class="h-8 md:h-10 w-auto">
                    <span class="text-lg md:text-xl font-extrabold tracking-tighter uppercase">Office<span class="text-primary">Manager</span></span>
                </a>
                <div class="flex items-center space-x-4">
                    <button onclick="toggleDarkMode()" class="w-10 h-10 rounded-xl flex items-center justify-center hover:bg-slate-200 dark:hover:bg-white/5 transition-all">
                        <i id="themeIcon" class="fa-solid fa-moon"></i>
                    </button>
                    <div id="authSection" class="flex items-center space-x-4">
                        <button id="loginBtn" onclick="toggleAuthModal()" class="px-5 py-2.5 bg-primary text-white text-[10px] font-black uppercase tracking-widest rounded-xl">Login</button>
                        <div id="userProfile" class="hidden flex items-center space-x-3">
                            <span id="userInitial" class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center text-xs font-black">A</span>
                            <button onclick="handleLogout()" class="w-8 h-8 rounded-full bg-slate-100 dark:bg-white/5 text-red-500 hover:bg-red-500 hover:text-white transition-all flex items-center justify-center text-xs"><i class="fa-solid fa-power-off"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 md:px-6 py-12 md:py-20 animate-premium">
        <div class="text-center mb-12 md:mb-20">
            <h1 class="text-4xl md:text-6xl font-black tracking-tighter mb-4">Emergency Hub</h1>
            <p class="text-slate-500 dark:text-slate-400 text-base md:text-lg">Laporkan kendala fasilitas kantor dalam hitungan detik. 🛠️</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12 animate-premium">
            <div class="glass p-8 rounded-premium shadow-sm flex items-center gap-6"><div class="w-16 h-16 rounded-2xl bg-amber-50 text-amber-500 flex items-center justify-center text-2xl"><i class="fa-solid fa-hourglass-half"></i></div><div><span class="text-[10px] font-black uppercase text-slate-400 block">Menunggu</span><h3 id="ticketStatWait" class="text-3xl font-black">0</h3></div></div>
            <div class="glass p-8 rounded-premium shadow-sm flex items-center gap-6"><div class="w-16 h-16 rounded-2xl bg-blue-50 text-blue-500 flex items-center justify-center text-2xl"><i class="fa-solid fa-gears"></i></div><div><span class="text-[10px] font-black uppercase text-slate-400 block">Diproses</span><h3 id="ticketStatProcess" class="text-3xl font-black">0</h3></div></div>
            <div class="glass p-8 rounded-premium shadow-sm flex items-center gap-6"><div class="w-16 h-16 rounded-2xl bg-emerald-50 text-emerald-500 flex items-center justify-center text-2xl"><i class="fa-solid fa-check-double"></i></div><div><span class="text-[10px] font-black uppercase text-slate-400 block">Selesai</span><h3 id="ticketStatDone" class="text-3xl font-black">0</h3></div></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
            <div class="lg:col-span-1">
                <div class="glass p-8 md:p-10 rounded-[2rem] md:rounded-super-premium border-t-4 border-t-amber-500 shadow-2xl sticky top-32">
                    <h2 class="text-2xl font-black mb-8">Buat Laporan</h2>
                    <form id="addTicketForm" onsubmit="handleTicketSubmit(event)" class="space-y-6">
                        <input list="assetList" id="ticketSubject" required placeholder="Subjek Kendala" class="w-full px-5 py-4 bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl font-bold focus:border-amber-500 outline-none transition-all"><datalist id="assetList"><option value="AC / Pendingin Ruangan"><option value="WiFi"><option value="Listrik"></datalist>
                        <textarea id="ticketDetail" placeholder="Detail masalah..." class="w-full px-5 py-4 bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl font-bold min-h-[80px] focus:border-amber-500 outline-none transition-all"></textarea>
                        <input type="text" id="ticketLocation" required placeholder="Lokasi" class="w-full px-5 py-4 bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl font-bold focus:border-amber-500 outline-none transition-all">
                        <div class="flex gap-2">
                            <button type="button" onclick="setUrgensi('NORMAL')" id="btnUrgensiNormal" class="flex-1 py-3 text-[10px] font-black rounded-xl border-2 border-primary bg-blue-50 text-primary">NORMAL</button>
                            <button type="button" onclick="setUrgensi('DARURAT')" id="btnUrgensiDarurat" class="flex-1 py-3 text-[10px] font-black rounded-xl border-2 border-slate-100 text-slate-400">DARURAT 🚨</button>
                        </div>
                        <button type="submit" class="w-full bg-amber-500 text-white font-black py-5 md:py-6 rounded-2xl shadow-xl shadow-amber-500/20 hover:bg-amber-600 transition-all uppercase tracking-widest text-xs pt-7 md:pt-8">Kirim Laporan</button>
                    </form>
                </div>
            </div>
            <div class="lg:col-span-2 space-y-6">
                <div class="glass p-6 rounded-premium shadow-sm mb-8 border-l-4 border-l-primary flex gap-4 items-center animate-premium">
                    <div class="flex-1 relative w-full">
                        <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="text" id="searchTicketInput" onkeyup="handleTicketSearch()" placeholder="Cari ID atau Kata Kunci..." class="w-full pl-14 pr-14 py-4 bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl outline-none font-bold">
                    </div>
                </div>
                <div id="ticketList" class="space-y-6"></div>
            </div>
        </div>
    </main>

    <div id="authModal" class="opacity-0 pointer-events-none fixed inset-0 flex items-center justify-center z-[160] transition-all duration-500 p-4"><div class="absolute inset-0 bg-slate-900/60 backdrop-blur-md" onclick="toggleAuthModal()"></div><div class="glass w-full max-w-sm mx-auto rounded-super-premium shadow-2xl z-[170] p-8 md:p-12 transform scale-95 transition-all text-center"><img src="assets/branding/logo-k-refined.png" class="h-12 w-auto mx-auto mb-6"><h2 class="text-2xl font-black">Admin Access</h2><form id="loginForm" onsubmit="handleLogin(event)" class="space-y-5 mt-8"><input type="email" id="loginEmail" required placeholder="Email Admin" class="w-full px-6 py-4 bg-slate-100 dark:bg-white/5 border rounded-2xl font-bold"><input type="password" id="loginPassword" required placeholder="Password" class="w-full px-6 py-4 bg-slate-100 dark:bg-white/5 border rounded-2xl font-bold"><button type="submit" class="w-full bg-primary text-white font-black py-5 rounded-2xl pt-7">Masuk Sekarang</button></form></div></div>
    <div id="confirmModal" class="opacity-0 pointer-events-none fixed inset-0 flex items-center justify-center z-[180] transition-all duration-500 p-4"><div class="absolute inset-0 bg-slate-900/60 backdrop-blur-md"></div><div class="glass w-full max-w-sm mx-auto rounded-super-premium shadow-2xl p-10 transform scale-95 text-center"><h2 id="confirmTitle" class="text-2xl font-black mb-2">Konfirmasi</h2><p id="confirmMessage" class="text-xs font-bold text-slate-400 mb-10">Yakin?</p><div class="flex gap-3"><button id="confirmCancel" class="flex-1 py-4 glass text-slate-400 font-black rounded-2xl">Batal</button><button id="confirmOk" class="flex-1 py-4 bg-primary text-white font-black rounded-2xl">Lanjut</button></div></div></div>

    <script>
        const SUPABASE_URL = 'https://hzuafwnxsqkioqkgokbf.supabase.co', SUPABASE_KEY = 'sb_publishable_ADFBXS4OmcbtFjpFfZJ5fg_jlbgBR7W';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let allTickets = [], currentUser = null, ticketUrgensi = 'NORMAL';

        window.onload = () => { 
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
            checkAuth(); fetchTickets(); 
        };
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('themeIcon').className = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        }

        async function checkAuth() { const { data: { session } } = await _supabase.auth.getSession(); updateUIForAuth(session?.user || null); _supabase.auth.onAuthStateChange((_e, s) => updateUIForAuth(s?.user || null)); }
        function updateUIForAuth(u) { currentUser = u; const loginBtn = document.getElementById('loginBtn'), up = document.getElementById('userProfile'); if(u) { loginBtn.classList.add('hidden'); up.classList.remove('hidden'); document.getElementById('userInitial').innerText = u.email.charAt(0).toUpperCase(); } else { loginBtn.classList.remove('hidden'); up.classList.add('hidden'); } renderTickets(allTickets); }
        async function handleLogin(e) { e.preventDefault(); const em = document.getElementById('loginEmail').value, pw = document.getElementById('loginPassword').value; const { error } = await _supabase.auth.signInWithPassword({ email: em, password: pw }); if (error) alert("Gagal"); else toggleAuthModal(); }
        async function handleLogout() { showConfirm('Log Out', 'Keluar?', async () => { await _supabase.auth.signOut(); }); }
        function toggleAuthModal() { const m = document.getElementById('authModal'); m.classList.toggle('opacity-0'); m.classList.toggle('pointer-events-none'); }
        function showConfirm(t, msg, onOk) { const m = document.getElementById('confirmModal'); document.getElementById('confirmTitle').innerText = t; document.getElementById('confirmMessage').innerText = msg; m.classList.remove('opacity-0', 'pointer-events-none'); const ok = document.getElementById('confirmOk'), can = document.getElementById('confirmCancel'), clean = () => { m.classList.add('opacity-0', 'pointer-events-none'); ok.onclick = null; can.onclick = null; }; ok.onclick = () => { clean(); onOk(); }; can.onclick = clean; }

        async function fetchTickets() { const { data, error } = await _supabase.from('office_tickets').select('*').order('created_at', { ascending: false }); if (!error) { allTickets = data || []; if(!document.getElementById('searchTicketInput').value) renderTickets(allTickets); } }
        function renderTickets(tickets) {
            document.getElementById('ticketStatWait').innerText = allTickets.filter(t => t.status === 'MENUNGGU').length;
            document.getElementById('ticketStatProcess').innerText = allTickets.filter(t => t.status === 'DIPROSES').length;
            document.getElementById('ticketStatDone').innerText = allTickets.filter(t => t.status === 'SELESAI').length;
            document.getElementById('ticketList').innerHTML = tickets.map(t => {
                const date = new Intl.DateTimeFormat('id-ID', { day: '2-digit', month: 'long', hour: '2-digit', minute: '2-digit' }).format(new Date(t.created_at));
                return `<div class="glass p-6 md:p-8 rounded-premium shadow-sm flex flex-col md:flex-row gap-6 md:gap-8 spring-card"><div class="w-16 h-16 md:w-20 md:h-20 bg-slate-100 dark:bg-white/5 rounded-2xl flex items-center justify-center flex-shrink-0">${t.status === 'SELESAI' ? '<i class="fa-solid fa-circle-check text-2xl md:text-3xl text-emerald-500"></i>' : '<i class="fa-solid fa-file-invoice text-2xl md:text-3xl opacity-20"></i>'}</div><div class="flex-1"><div class="flex justify-between items-start mb-4"><span class="badge badge-${t.status.toLowerCase()}">${t.status}</span><div class="text-right"><span class="text-[9px] font-black text-slate-300 block">ID #${t.id.toString().slice(0,8)}</span><span class="text-[9px] font-black text-primary block mt-1"><i class="fa-solid fa-calendar-day mr-1"></i>${date} WIB</span></div></div><h3 class="text-xl font-black mb-2">${t.subject}</h3><div class="flex items-center gap-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest"><span><i class="fa-solid fa-location-dot mr-1.5 text-primary"></i>${t.location}</span>${t.urgency === 'DARURAT' ? '<span class="text-red-500 font-black animate-pulse">DARURAT</span>' : ''}</div>${currentUser ? `<div class="flex gap-2 mt-6">${t.status === 'MENUNGGU' ? `<button onclick="updateTicketStatus('${t.id}', 'DIPROSES')" class="px-5 py-2 bg-blue-50 text-blue-600 text-[9px] font-black rounded-xl">PROSES</button>` : ''}${t.status !== 'SELESAI' ? `<button onclick="updateTicketStatus('${t.id}', 'SELESAI')" class="px-5 py-2 bg-emerald-50 text-emerald-600 text-[9px] font-black rounded-xl">SELESAI</button>` : ''}<button onclick="deleteTicket('${t.id}')" class="px-5 py-2 bg-red-50 text-red-500 text-[9px] font-black rounded-xl">HAPUS</button></div>` : ''}</div></div>`;
            }).join('');
        }

        async function handleTicketSubmit(e) { e.preventDefault(); const asset = document.getElementById('ticketSubject').value, detail = document.getElementById('ticketDetail').value, sub = detail ? `${asset}: ${detail}` : asset, loc = document.getElementById('ticketLocation').value, urg = ticketUrgensi; try { const { error } = await _supabase.from('office_tickets').insert([{ subject: sub, location: loc, urgency: urg, status: 'MENUNGGU' }]); if(!error) { alert("Laporan Berhasil Terkirim!"); e.target.reset(); fetchTickets(); } } catch(e) {} }
        function setUrgensi(v) { ticketUrgensi = v; document.getElementById('btnUrgensiNormal').className = v === 'NORMAL' ? "flex-1 py-3 text-[10px] font-black rounded-xl border-2 border-primary bg-blue-50 text-primary" : "flex-1 py-3 text-[10px] font-black rounded-xl border-2 border-slate-100 text-slate-400"; document.getElementById('btnUrgensiDarurat').className = v === 'DARURAT' ? "flex-1 py-3 text-[10px] font-black rounded-xl border-2 border-red-500 bg-red-50 text-red-600" : "flex-1 py-3 text-[10px] font-black rounded-xl border-2 border-slate-100 text-slate-400"; }
        function handleTicketSearch() { const i = document.getElementById('searchTicketInput').value.toLowerCase().trim(); if(!i) { renderTickets(allTickets); return; } const filtered = allTickets.filter(t => t.id.toString().toLowerCase().includes(i.replace('#','')) || t.subject.toLowerCase().includes(i) || t.location.toLowerCase().includes(i)); renderTickets(filtered); }
        async function updateTicketStatus(id, s) { await _supabase.from('office_tickets').update({ status: s }).eq('id', id); fetchTickets(); }
        async function deleteTicket(id) { showConfirm('Hapus', 'Hapus riwayat?', async () => { await _supabase.from('office_tickets').delete().eq('id', id); fetchTickets(); }); }
    </script>
</body>
</html>
