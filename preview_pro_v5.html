<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAPOR FM DDP - Office Manager</title>
    <link rel="icon" type="image/png" href="assets/branding/favicon-k.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#0056B3', dark: { bg: '#050505', card: '#121212', border: '#222222' } },
                    borderRadius: { 'premium': '1.5rem', 'super-premium': '2.5rem' }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body { @apply font-['Plus_Jakarta_Sans'] antialiased bg-slate-50 text-slate-900 dark:bg-[#050505] dark:text-white transition-all duration-500; }
        }
        @layer components {
            .glass { @apply bg-white/70 dark:bg-white/5 backdrop-blur-xl border border-white/20 dark:border-white/5; }
            .type-card { @apply relative flex flex-col items-center justify-center p-4 rounded-2xl border-2 border-slate-100 dark:border-white/5 bg-white dark:bg-white/5 transition-all cursor-pointer hover:border-amber-500/50 outline-none; }
            .type-card.selected { @apply border-amber-500 bg-white dark:bg-white/5 shadow-2xl shadow-amber-500/10 scale-[1.05]; }
            .type-card i { @apply text-2xl mb-2 transition-colors; }
            .type-card span { @apply text-[9px] font-bold uppercase tracking-tighter transition-colors; }
            .type-card.selected i, .type-card.selected span { @apply text-amber-500; }
        }
        .hero-gradient { background: radial-gradient(circle at 50% 50%, #0056B3 0%, transparent 70%); opacity: 0.08; position: fixed; width: 100vw; height: 100vh; z-index: -1; }
    </style>
</head>
<body class="min-h-screen">
    <div class="hero-gradient"></div>
    
    <nav class="glass sticky top-0 z-50 border-b border-slate-200 dark:border-white/5 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 md:px-6">
            <div class="flex justify-between h-16 md:h-20 items-center gap-2">
                <div class="flex items-center gap-2 md:gap-6 min-w-0">
                    <a href="index.html" class="group flex items-center gap-2 px-4 py-2 bg-slate-100 dark:bg-white/5 rounded-xl border border-slate-200 dark:border-white/10 hover:bg-primary hover:text-white transition-all">
                        <i class="fa-solid fa-house-chimney text-xs group-hover:scale-110 transition-transform"></i>
                        <span class="text-[9px] font-black uppercase tracking-widest hidden sm:inline">Portal Utama</span>
                    </a>
                    <div class="h-6 w-[1px] bg-slate-200 dark:bg-slate-800 hidden md:block"></div>
                    <div class="flex items-center gap-2 md:gap-4 flex-shrink">
                        <span class="text-sm md:text-xl font-black tracking-tighter uppercase italic truncate">LAPOR <span class="text-primary">FM DDP</span></span>
                    </div>
                </div>
                <div class="flex items-center gap-2 md:gap-4 flex-shrink-0">
                    <button onclick="document.documentElement.classList.toggle('dark')" class="w-9 h-9 md:w-10 md:h-10 rounded-xl flex items-center justify-center hover:bg-slate-200 dark:hover:bg-white/5 transition-all">
                        <i class="fa-solid fa-moon"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 md:px-6 py-12">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
            <div class="lg:col-span-1">
                <div class="glass p-8 rounded-super-premium border-t-4 border-t-amber-500 shadow-2xl">
                    <h2 class="text-2xl font-black mb-8 tracking-tighter uppercase italic">Buat Laporan <span class="text-amber-500">Baru</span></h2>
                    <form class="space-y-6">
                        <!-- JENIS KELUAN WITH NEW LISTRIK CARD & FURNITUR TEXT -->
                        <div class="space-y-3">
                            <label class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em] ml-2">Jenis Keluhan</label>
                            <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                                <button type="button" class="type-card group"><i class="fa-solid fa-snowflake"></i><span>AC</span></button>
                                <button type="button" class="type-card group"><i class="fa-solid fa-wifi"></i><span>Internet</span></button>
                                <button type="button" class="type-card group"><i class="fa-solid fa-restroom"></i><span>Toilet</span></button>
                                
                                <!-- NEW: LISTRIK CARD -->
                                <button type="button" class="type-card group selected border-amber-500 shadow-lg shadow-amber-500/10">
                                    <i class="fa-solid fa-bolt-lightning text-amber-500 animate-pulse"></i>
                                    <span class="text-amber-500">Listrik</span>
                                </button>

                                <!-- REVISED: MEBEL TO FURNITUR -->
                                <button type="button" class="type-card group"><i class="fa-solid fa-chair"></i><span>Furnitur</span></button>
                                
                                <button type="button" class="type-card group"><i class="fa-solid fa-ellipsis"></i><span>Lainnya</span></button>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-2">Detail Keluhan</label>
                            <textarea placeholder="Jelaskan kendala..." class="w-full px-6 py-4 bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl font-bold min-h-[80px] focus:border-amber-500 outline-none text-xs"></textarea>
                        </div>

                        <button type="button" class="w-full bg-amber-500 text-white font-black py-6 rounded-2xl shadow-xl shadow-amber-500/20 uppercase tracking-[0.2em] text-[10px] pt-8">Kirim Laporan</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="bg-white p-6 rounded-2xl border border-slate-100 italic text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                    <i class="fa-solid fa-circle-info mr-2 text-amber-500"></i> Preview Pembaruan: Ikon Listrik Ditambahkan & Teks Furnitur Diperbarui.
                </div>
            </div>
        </div>
    </main>
</body>
</html>
