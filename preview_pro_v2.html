<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAPOR FM DDP - Office Manager</title>
    <link rel="icon" type="image/png" href="assets/branding/favicon-k.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#0056B3', dark: { bg: '#050505', card: '#121212', border: '#222222' } },
                    borderRadius: { 'premium': '1.5rem', 'super-premium': '2.5rem' }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body { @apply font-['Plus_Jakarta_Sans'] antialiased transition-all duration-500 bg-slate-50 text-slate-900 dark:bg-[#050505] dark:text-white; }
        }
        @layer components {
            .glass { @apply bg-white/70 dark:bg-white/5 backdrop-blur-xl border border-white/20 dark:border-white/5; }
            .badge { @apply px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest border; }
            .badge-menunggu { @apply bg-amber-50 text-amber-600 border-amber-100; }
            .badge-diproses { @apply bg-blue-50 text-blue-600 border-blue-100; }
            .badge-selesai { @apply bg-emerald-50 text-emerald-600 border-emerald-100; }
            
            .type-card { @apply relative flex flex-col items-center justify-center p-4 rounded-2xl border-2 border-slate-100 dark:border-white/5 bg-white dark:bg-white/5 transition-all cursor-pointer hover:border-amber-500/50 outline-none; }
            .type-card.selected { @apply border-amber-500 bg-white dark:bg-white/5 shadow-2xl shadow-amber-500/10 scale-[1.05]; }
            .type-card i, .type-card span { @apply pointer-events-none transition-colors duration-300; }
            .type-card i { @apply text-2xl mb-2; }
            .type-card.selected i { @apply text-amber-500 scale-110; }
            .type-card.selected span { @apply text-amber-500; }
        }
        .hero-gradient { background: radial-gradient(circle at 50% 50%, #0056B3 0%, transparent 70%); opacity: 0.08; position: fixed; width: 100vw; height: 100vh; z-index: -1; }
        .dark .hero-gradient { opacity: 0.15; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-premium { animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .upload-area { border: 2px dashed #cbd5e1; @apply transition-all duration-300; }
        .upload-area:hover { border-color: #f59e0b; background: rgba(245, 158, 11, 0.05); }
    </style>
</head>
<body class="min-h-screen">
    <div class="hero-gradient"></div>
    
    <!-- Success Modal -->
    <div id="successModal" class="fixed inset-0 z-[300] hidden items-center justify-center p-6 bg-slate-900/60 backdrop-blur-xl">
        <div class="glass max-w-lg w-full rounded-[3rem] p-12 text-center shadow-2xl border-t-4 border-t-amber-500" id="successCard">
            <div class="w-24 h-24 bg-amber-500/10 text-amber-500 rounded-full flex items-center justify-center mx-auto mb-8 shadow-inner"><i class="fa-solid fa-paper-plane text-4xl"></i></div>
            <h2 class="text-4xl font-black mb-4 tracking-tighter italic">TERKIRIM!</h2>
            <p class="text-slate-500 dark:text-slate-400 mb-10 leading-relaxed font-medium">Laporan Tuan Muda sudah Kimshie catat dan segera meluncur ke tim fasilitas. 🛠️✨</p>
            <button onclick="closeSuccessModal()" class="w-full bg-amber-500 text-white font-black py-5 rounded-2xl shadow-xl shadow-amber-500/30 hover:bg-amber-600 transition-all uppercase tracking-widest text-[11px] pt-7">Selesai & Tutup</button>
        </div>
    </div>

    <nav class="glass sticky top-0 z-50 border-b border-slate-200 dark:border-white/5 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 md:px-6">
            <div class="flex justify-between h-16 md:h-20 items-center gap-2">
                <div class="flex items-center gap-2 md:gap-6 min-w-0">
                    <a href="index.html" class="group flex items-center gap-2 px-4 py-2 bg-slate-100 dark:bg-white/5 rounded-xl border border-slate-200 dark:border-white/10 hover:bg-primary hover:text-white transition-all">
                        <i class="fa-solid fa-house-chimney text-xs group-hover:scale-110 transition-transform"></i>
                        <span class="text-[9px] font-black uppercase tracking-widest hidden sm:inline">Portal Utama</span>
                    </a>
                    <div class="h-6 w-[1px] bg-slate-200 dark:bg-slate-800 hidden md:block"></div>
                    <div class="flex items-center gap-2 md:gap-4 flex-shrink">
                        <img src="assets/branding/logo-k-refined.png" alt="Logo" class="h-7 md:h-9 w-auto">
                        <span class="text-xs md:text-lg font-black tracking-tighter uppercase italic truncate">LAPOR <span class="text-primary">FM DDP</span></span>
                    </div>
                </div>
                <div class="flex items-center gap-2 md:gap-4 flex-shrink-0">
                    <button onclick="toggleDarkMode()" class="w-9 h-9 md:w-10 md:h-10 rounded-xl flex items-center justify-center hover:bg-slate-200 dark:hover:bg-white/5 transition-all">
                        <i id="themeIcon" class="fa-solid fa-moon"></i>
                    </button>
                    <div id="authSection" class="flex items-center gap-2 md:gap-4">
                        <button id="loginBtn" onclick="toggleAuthModal()" class="px-4 md:px-5 py-2 md:py-2.5 bg-primary text-white text-[9px] md:text-[10px] font-black uppercase tracking-widest rounded-xl">Admin</button>
                        <div id="userProfile" class="hidden flex items-center gap-2 md:gap-3">
                            <span id="userInitial" class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center text-xs font-black">A</span>
                            <button onclick="handleLogout()" class="w-8 h-8 rounded-full bg-slate-100 dark:bg-white/5 text-red-500 hover:bg-red-500 hover:text-white transition-all flex items-center justify-center text-xs"><i class="fa-solid fa-power-off"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 md:px-6 py-12 animate-premium">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="glass p-8 rounded-premium shadow-sm flex items-center gap-6 border-l-4 border-l-amber-500">
                <div class="w-16 h-16 rounded-2xl bg-amber-500/10 text-amber-500 flex items-center justify-center text-2xl"><i class="fa-solid fa-hourglass-half"></i></div>
                <div><span class="text-[10px] font-black uppercase text-slate-400 block">Menunggu</span><h3 id="ticketStatWait" class="text-3xl font-black italic">0</h3></div>
            </div>
            <div class="glass p-8 rounded-premium shadow-sm flex items-center gap-6 border-l-4 border-l-blue-500">
                <div class="w-16 h-16 rounded-2xl bg-blue-500/10 text-blue-500 flex items-center justify-center text-2xl"><i class="fa-solid fa-gears"></i></div>
                <div><span class="text-[10px] font-black uppercase text-slate-400 block">Diproses</span><h3 id="ticketStatProcess" class="text-3xl font-black italic">0</h3></div>
            </div>
            <div class="glass p-8 rounded-premium shadow-sm flex items-center gap-6 border-l-4 border-l-emerald-500">
                <div class="w-16 h-16 rounded-2xl bg-emerald-500/10 text-emerald-500 flex items-center justify-center text-2xl"><i class="fa-solid fa-check-double"></i></div>
                <div><span class="text-[10px] font-black uppercase text-slate-400 block">Selesai</span><h3 id="ticketStatDone" class="text-3xl font-black italic">0</h3></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
            <div class="lg:col-span-1">
                <div class="glass p-8 rounded-super-premium border-t-4 border-t-amber-500 shadow-2xl sticky top-28 transition-all">
                    <h2 class="text-2xl font-black mb-8 tracking-tighter uppercase italic">Buat Laporan <span class="text-amber-500">Baru</span></h2>
                    <form id="addTicketForm" onsubmit="handleTicketSubmit(event)" class="space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-2">
                                <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-2">Pelapor</label>
                                <input type="text" id="reporterName" required placeholder="Nama" class="w-full px-4 py-4 bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl font-bold focus:border-amber-500 outline-none text-xs">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-2">Divisi</label>
                                <input type="text" id="reporterUnit" required placeholder="Divisi" class="w-full px-4 py-4 bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl font-bold focus:border-amber-500 outline-none text-xs">
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-2">Lokasi</label>
                            <select id="ticketLocation" required class="w-full px-6 py-4 bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl font-bold focus:border-amber-500 outline-none text-xs">
                                <option value="">Pilih Lokasi...</option>
                                <option>OPMC Lantai 2</option><option>OPMC Lantai 4</option><option>OPMC Lantai 5</option>
                                <option>Witel Lantai 2</option><option>Witel Lantai 5</option>
                            </select>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-2">Detail Keluhan</label>
                            <textarea id="ticketDetail" required placeholder="Jelaskan kendala..." class="w-full px-6 py-4 bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl font-bold min-h-[80px] focus:border-amber-500 outline-none text-xs"></textarea>
                        </div>

                        <!-- PHOTO UPLOAD INTEGRATION -->
                        <div class="space-y-2">
                            <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-2">Bukti Foto</label>
                            <div class="upload-area rounded-2xl p-6 text-center cursor-pointer relative overflow-hidden group" id="dropZone" onclick="document.getElementById('photoInput').click()">
                                <input type="file" id="photoInput" class="hidden" accept="image/*" onchange="previewImg(this)">
                                <div id="uploadPlaceholder">
                                    <i class="fa-solid fa-camera text-2xl text-slate-300 group-hover:text-amber-500 transition-colors mb-1"></i>
                                    <p class="text-[9px] font-bold text-slate-400 uppercase">Ambil / Upload Foto</p>
                                </div>
                                <img id="imagePreview" class="hidden absolute inset-0 w-full h-full object-cover rounded-2xl">
                                <button type="button" id="removeBtn" class="hidden absolute top-2 right-2 w-7 h-7 bg-red-500 text-white rounded-lg items-center justify-center shadow-lg z-10" onclick="resetUpload(event)"><i class="fa-solid fa-xmark text-[10px]"></i></button>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-2">Urgensi</label>
                            <div class="flex gap-2">
                                <button type="button" onclick="setUrgensi('NORMAL')" id="btnUrgensiNormal" class="flex-1 py-4 text-[9px] font-black rounded-xl border-2 border-primary bg-blue-50 text-primary">NORMAL</button>
                                <button type="button" onclick="setUrgensi('DARURAT')" id="btnUrgensiDarurat" class="flex-1 py-4 text-[9px] font-black rounded-xl border-2 border-slate-100 text-slate-400 uppercase tracking-tighter">DARURAT 🚨</button>
                            </div>
                        </div>

                        <button type="submit" id="submitBtn" class="w-full bg-amber-500 text-white font-black py-6 rounded-2xl shadow-xl shadow-amber-500/20 hover:bg-amber-600 transition-all uppercase tracking-[0.2em] text-[10px] pt-8">Kirim Laporan</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="glass p-6 rounded-premium shadow-sm border-l-4 border-l-primary flex gap-4 items-center">
                    <div class="flex-1 relative w-full">
                        <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="text" id="searchTicketInput" onkeyup="handleTicketSearch()" placeholder="Cari laporan..." class="w-full pl-14 pr-14 py-4 bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl outline-none font-bold text-xs uppercase tracking-tighter italic">
                    </div>
                </div>
                <div id="ticketList" class="space-y-6"></div>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://hzuafwnxsqkioqkgokbf.supabase.co', SUPABASE_KEY = 'sb_publishable_ADFBXS4OmcbtFjpFfZJ5fg_jlbgBR7W';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let allTickets = [], currentUser = null, ticketUrgensi = 'NORMAL';

        window.onload = () => { 
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) document.documentElement.classList.add('dark');
            checkAuth(); fetchTickets(); 
        };

        function previewImg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.getElementById('imagePreview');
                    img.src = e.target.result;
                    img.classList.remove('hidden');
                    document.getElementById('uploadPlaceholder').classList.add('opacity-0');
                    document.getElementById('removeBtn').classList.remove('hidden');
                    document.getElementById('removeBtn').classList.add('flex');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function resetUpload(e) {
            e.stopPropagation();
            document.getElementById('photoInput').value = '';
            document.getElementById('imagePreview').src = '';
            document.getElementById('imagePreview').classList.add('hidden');
            document.getElementById('uploadPlaceholder').classList.remove('opacity-0');
            document.getElementById('removeBtn').classList.add('hidden');
        }

        async function checkAuth() { const { data: { session } } = await _supabase.auth.getSession(); currentUser = session?.user; fetchTickets(); }
        async function fetchTickets() { const { data, error } = await _supabase.from('office_tickets').select('*').order('created_at', { ascending: false }); if (!error) { allTickets = data || []; renderTickets(allTickets); } }
        
        function renderTickets(tickets) {
            document.getElementById('ticketStatWait').innerText = allTickets.filter(t => t.status === 'MENUNGGU').length;
            document.getElementById('ticketStatProcess').innerText = allTickets.filter(t => t.status === 'DIPROSES').length;
            document.getElementById('ticketStatDone').innerText = allTickets.filter(t => t.status === 'SELESAI').length;
            document.getElementById('ticketList').innerHTML = tickets.map(t => `
                <div class="glass p-6 rounded-premium shadow-sm flex flex-col md:flex-row gap-6 border border-slate-200/50 dark:border-white/5 animate-premium">
                    <div class="w-16 h-16 bg-slate-100 dark:bg-white/5 rounded-2xl flex items-center justify-center flex-shrink-0">
                        <i class="fa-solid fa-file-invoice text-2xl opacity-20"></i>
                    </div>
                    <div class="flex-1">
                        <div class="flex justify-between items-start mb-4">
                            <span class="badge badge-${t.status.toLowerCase()}">${t.status}</span>
                            <span class="text-[9px] font-black text-slate-300">ID #${t.id.toString().slice(0,8)}</span>
                        </div>
                        <h3 class="text-lg font-black mb-2 italic uppercase tracking-tighter">${t.subject}</h3>
                        <div class="flex items-center gap-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest italic">
                            <span class="flex items-center gap-1.5"><i class="fa-solid fa-location-dot text-primary"></i>${t.location}</span>
                            ${t.urgency === 'DARURAT' ? '<span class="text-red-500 font-black animate-pulse">🚨 DARURAT</span>' : ''}
                        </div>
                    </div>
                </div>`).join('');
        }

        function setUrgensi(v) { 
            ticketUrgensi = v; 
            document.getElementById('btnUrgensiNormal').className = v === 'NORMAL' ? "flex-1 py-4 text-[9px] font-black rounded-xl border-2 border-primary bg-blue-50 text-primary" : "flex-1 py-4 text-[9px] font-black rounded-xl border-2 border-slate-100 text-slate-400"; 
            document.getElementById('btnUrgensiDarurat').className = v === 'DARURAT' ? "flex-1 py-4 text-[9px] font-black rounded-xl border-2 border-red-500 bg-red-50 text-red-600 animate-pulse" : "flex-1 py-4 text-[9px] font-black rounded-xl border-2 border-slate-100 text-slate-400"; 
        }

        async function handleTicketSubmit(e) { e.preventDefault(); alert("Laporan terkirim (Demo Mode)"); e.target.reset(); resetUpload(e); }
        function toggleDarkMode() { const isDark = document.documentElement.classList.toggle('dark'); localStorage.theme = isDark ? 'dark' : 'light'; }
        function closeSuccessModal() { document.getElementById('successModal').classList.add('hidden'); }
    </script>
</body>
</html>
