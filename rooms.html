                            <div class="flex items-center gap-4 p-4 rounded-2xl bg-slate-50 dark:bg-white/5 border border-slate-100 dark:border-white/5 spring-card"><div class="w-10 h-10 rounded-xl bg-primary/10 text-primary flex items-center justify-center"><i class="fa-solid fa-user-tie"></i></div><div><p class="text-[10px] font-black text-slate-400 uppercase leading-none mb-1">Apit Lesmana</p><p class="text-xs font-bold font-mono text-primary">082114705237</p></div></div>

                        <textarea id="bookingAgenda" required rows="3" placeholder="Agenda..." class="w-full px-6 py-4 bg-slate-50 dark:bg-white/5 border rounded-2xl font-bold"></textarea>

    <script>
        const SUPABASE_URL = 'https://hzuafwnxsqkioqkgokbf.supabase.co', SUPABASE_KEY = 'sb_publishable_ADFBXS4OmcbtFjpFfZJ5fg_jlbgBR7W';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let activeFloor = 7;
        const buildingData = { floors: [2, 4, 7], rooms: { 2: [{ name: 'Lantai 2 Witel Ruang Colaboration', cap: 40, top: '10%', left: '10%', w: '80%', h: '80%', type: 'room' }], 4: [{ name: 'Ruang rapat besar lantai 4', top: '10%', left: '10%', w: '80%', h: '80%', type: 'room' }], 7: [{ name: 'Lantai 7 Witel Spark room 1', cap: 20, top: '5%', left: '5%', w: '40%', h: '35%', type: 'room' }, { name: 'Lantai 7 Witel Spark room 2', cap: 16, top: '5%', right: '5%', w: '40%', h: '35%', type: 'room' }, { name: 'Lantai 7 Witel Mindspace 2', cap: 6, bottom: '5%', left: '5%', w: '35%', h: '45%', type: 'room' }] } };

        window.onload = () => { renderFloorSwitcher(); renderFloorPlan(); checkAuth(); };
        function renderFloorSwitcher() { const c = document.getElementById('floorSwitcher'); c.innerHTML = buildingData.floors.sort((a,b)=>b-a).map(f => `<button onclick="switchFloor(${f})" class="px-6 py-2 rounded-lg text-[10px] font-black uppercase ${f === activeFloor ? 'bg-blue-50 text-primary border-2 border-primary' : 'text-slate-400'}">Lantai ${f}</button>`).join(''); }
        function switchFloor(f) { activeFloor = f; renderFloorSwitcher(); renderFloorPlan(); }
        function renderFloorPlan() { const c = document.getElementById('map-container'), r = buildingData.rooms[activeFloor] || []; document.getElementById('planTitle').innerText = `Denah Lantai ${activeFloor}`; let h = `<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[100px] h-[100px] border-2 border-slate-200 dark:border-white/10 flex items-center justify-center bg-white dark:bg-white/5 rounded-2xl shadow-inner"><span class="text-[8px] font-black text-slate-300 uppercase">Lobby</span></div>`; r.forEach(room => { const s = `${room.top?`top:${room.top};`:`bottom:${room.bottom};`} ${room.left?`left:${room.left};`:`right:${room.right};`} width:${room.w}; height:${room.h};`; h += `<div class="absolute border-2 border-dashed border-slate-300 dark:border-white/10 rounded-2xl hover:border-primary hover:bg-primary/5 transition-all cursor-pointer flex flex-col items-center justify-center group z-10" style="${s}" onclick="openBooking('${room.name}')"><div class="w-2 h-2 rounded-full bg-emerald-500 mb-2"></div><span class="text-[9px] font-black text-slate-600 dark:text-slate-300 text-center px-2 uppercase">${room.name}</span></div>`; }); c.innerHTML = h; }
        
        function openBooking(room) { 
            const imgs = { 'Lantai 2 Witel Ruang Colaboration': 'https://lh7-rt.googleusercontent.com/formsz/AN7BsVBrW09Yns2HU61cu-3BpFZ-vDfMnrngM6JVJio5agKeNshVS6nSSHXnTaRQAcf2EKzNUnUsEXxNgFOMTUNKlr2JEdhjY2EtWZr7O9R72L-YkYJ_c9QlYEyF3aqFX19IEtJWJlpRkPElsJiDwwLJ5bIYxVj43F-U8dpSvVvNMpG5fox7paNlxiSwEMH7dxVb7sxl95jw8b3af-36=w600?key=nJ46R7ZS1TueXAVPvww5Ig', 'Ruang rapat besar lantai 4': 'https://lh7-rt.googleusercontent.com/formsz/AN7BsVBSn0WwzPD3TL528yA8szsE_tQ2uNsiwKjnbH-N0LWSgzp5G0Cz_TJK78OmpIpQ_-OaTgvAsO_lDhpcHQUvJ9LdVi0Wyd5P8egsa1Z5D26PjHKB5YkLzeze7LnvDyuPlX9IPNYgq2vZB4aqIS0a3ngKy7Lwmw_2V8iHd-Qm7N9v763AeS0b1M7MBITI01Uh5lGAJ0E6VPjYsYrL=w600?key=nJ46R7ZS1TueXAVPvww5Ig' };
            if(imgs[room]) document.getElementById('activeRoomImg').src = imgs[room];
            document.getElementById('activeRoomName').innerText = room;
            document.getElementById('bookingContainer').classList.remove('hidden');
            document.getElementById('bookingRoomName').value = room;
            document.getElementById('bookingRoomLabel').innerText = room;
            document.getElementById('bookingContainer').scrollIntoView({ behavior: 'smooth' });
        }
        function closeBooking() { document.getElementById('bookingContainer').classList.add('hidden'); }
        async function handleBookingSubmit(e) { e.preventDefault(); const room = document.getElementById('bookingRoomName').value, name = document.getElementById('bookingName').value, wa = document.getElementById('bookingWA').value, unit = document.getElementById('bookingUnit').value, date = document.getElementById('bookingDate').value, start = document.getElementById('bookingStart').value, end = document.getElementById('bookingEnd').value, agenda = document.getElementById('bookingAgenda').value; try { const formUrl = "https://docs.google.com/forms/d/e/1FAIpQLScV8k27aPjDgsj4VkwFL1IH_c8_te2KHzk5eFouS27XorZfag/formResponse"; const params = new URLSearchParams(); params.append('entry.1275419724', name); params.append('entry.803108456', wa); params.append('entry.276085607', unit); params.append('entry.905896922', room); params.append('entry.524278036', date); params.append('entry.1846877829', start); params.append('entry.1854871766', end); params.append('entry.109089657', agenda); fetch(formUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: params.toString() }); await _supabase.from('office_tickets').insert([{ subject: `RESERVASI: ${room} - ${agenda}`, location: room, status: 'MENUNGGU' }]); alert("Berhasil Sinkron!"); closeBooking(); } catch(e) {} }
        function toggleDarkMode() { document.documentElement.classList.toggle('dark'); }
        async function checkAuth() { const { data: { session } } = await _supabase.auth.getSession(); if(session) { document.getElementById('loginBtn').classList.add('hidden'); document.getElementById('userProfile').classList.remove('hidden'); document.getElementById('userInitial').innerText = session.user.email.charAt(0).toUpperCase(); } }
    </script>
