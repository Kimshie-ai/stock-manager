<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Booking - Office Manager</title>
    <link rel="icon" type="image/png" href="assets/branding/favicon-k.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { 
                        primary: '#0056B3', 
                        kimshie: '#FFB7C5',
                        dark: { bg: '#050505', card: '#121212', border: '#222222', text: '#FFFFFF', muted: '#A0A0A0' }
                    },
                    borderRadius: { 'premium': '1.5rem', 'super-premium': '2.5rem' }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: white; -webkit-font-smoothing: antialiased; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .hero-gradient { background: radial-gradient(circle at 50% 50%, #0056B3 0%, #050505 70%); opacity: 0.15; position: fixed; width: 100vw; height: 100vh; z-index: -1; }
        .spring-card { transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .spring-card:hover { transform: translateY(-8px) scale(1.01); background: rgba(255, 255, 255, 0.06); border-color: #0056B3; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-premium { animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen">
    <div class="hero-gradient"></div>
    <div id="toast-container" class="fixed top-6 right-6 z-[200]"></div>

    <!-- Navigation -->
    <nav class="glass sticky top-0 z-50 border-b border-white/5 shadow-2xl">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex justify-between h-20 items-center">
                <a href="index.html" class="flex items-center space-x-4">
                    <img src="assets/branding/logo-k-refined.png" alt="Kimshie Logo" class="h-10 w-auto">
                    <div class="h-6 w-[1px] bg-white/10 mx-2"></div>
                    <span class="text-xl font-extrabold tracking-tighter uppercase">Office<span class="text-primary">Manager</span></span>
                </a>
                <div class="flex items-center space-x-6">
                    <div id="authSection">
                        <button id="loginBtn" onclick="toggleAuthModal()" class="px-6 py-2.5 bg-primary text-white text-[10px] font-black uppercase tracking-widest rounded-xl hover:bg-blue-700 transition-all">Login</button>
                        <div id="userProfile" class="hidden flex items-center space-x-3">
                            <span id="userInitial" class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center text-xs font-black border border-white/20 shadow-lg shadow-primary/20">A</span>
                            <button onclick="handleLogout()" class="w-8 h-8 rounded-full bg-white/5 text-red-400 hover:bg-red-500 hover:text-white transition-all flex items-center justify-center text-xs"><i class="fa-solid fa-power-off"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <header class="pt-20 pb-12 max-w-7xl mx-auto px-6 animate-premium">
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
            <div>
                <h1 class="text-6xl font-black tracking-tighter mb-4">Pesan Ruangan</h1>
                <p class="text-slate-500 text-lg">Pilih ruang rapat yang tersedia dan atur jadwal Anda secepat kilat. 🏢⚡</p>
            </div>
            <div class="flex gap-3">
                <div class="glass px-6 py-4 rounded-2xl border-l-4 border-l-primary">
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Total Ruangan</p>
                    <p class="text-xl font-black" id="roomCount">--</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-32 relative z-10">
        <!-- Room Grid -->
        <div id="roomGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 animate-premium" style="animation-delay: 0.2s;">
            <!-- Rendered by JS -->
        </div>

        <!-- Booking Form Section -->
        <div id="bookingContainer" class="hidden mt-20 animate-premium">
            <div class="max-w-3xl mx-auto glass p-12 rounded-super-premium border-t-4 border-t-primary relative shadow-2xl overflow-hidden">
                <div class="absolute -top-24 -right-24 w-64 h-64 bg-primary/10 rounded-full blur-3xl"></div>
                <button onclick="closeBooking()" class="absolute top-8 right-8 text-slate-500 hover:text-red-500 transition-colors"><i class="fa-solid fa-circle-xmark text-2xl"></i></button>
                
                <div class="text-center mb-12">
                    <h2 class="text-4xl font-black mb-2 tracking-tighter">Form Reservasi</h2>
                    <p id="bookingRoomLabel" class="text-xs font-black text-primary uppercase tracking-[0.3em]">NAMA RUANGAN</p>
                </div>

                <form id="roomBookingForm" onsubmit="handleBookingSubmit(event)" class="space-y-8 relative z-10">
                    <input type="hidden" id="bookingRoomName">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-4">Nama Lengkap</label>
                            <input type="text" id="bookingName" required placeholder="Contoh: Abigail" class="w-full px-6 py-4 bg-white/5 border border-white/10 rounded-2xl font-bold focus:border-primary outline-none transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-4">WhatsApp</label>
                            <input type="tel" id="bookingWA" required placeholder="0812..." class="w-full px-6 py-4 bg-white/5 border border-white/10 rounded-2xl font-bold focus:border-primary outline-none transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-4">Unit / Departemen</label>
                            <select id="bookingUnit" required class="w-full px-6 py-4 bg-white/5 border border-white/10 rounded-2xl font-bold focus:border-primary outline-none transition-all">
                                <option value="" class="bg-dark-card text-white">Pilih Unit...</option>
                                <option class="bg-dark-card text-white">SIM</option>
                                <option class="bg-dark-card text-white">PAM</option>
                                <option class="bg-dark-card text-white">BIG</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-4">Tanggal Meeting</label>
                            <input type="date" id="bookingDate" required class="w-full px-6 py-4 bg-white/5 border border-white/10 rounded-2xl font-bold focus:border-primary outline-none transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-4">Jam Mulai</label>
                            <input type="time" id="bookingStart" required class="w-full px-6 py-4 bg-white/5 border border-white/10 rounded-2xl font-bold focus:border-primary outline-none transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-4">Jam Selesai</label>
                            <input type="time" id="bookingEnd" required class="w-full px-6 py-4 bg-white/5 border border-white/10 rounded-2xl font-bold focus:border-primary outline-none transition-all">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-4">Agenda / Keperluan</label>
                        <textarea id="bookingAgenda" required rows="3" placeholder="Tuliskan tujuan rapat..." class="w-full px-6 py-4 bg-white/5 border border-white/10 rounded-2xl font-bold focus:border-primary outline-none transition-all"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-primary text-white font-black py-6 rounded-2xl shadow-xl shadow-primary/30 hover:bg-blue-700 transition-all uppercase tracking-widest text-xs pt-8">Konfirmasi Reservasi Sekarang</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="mt-24 text-center pb-12 border-t border-white/5 pt-12">
        <p class="text-[10px] font-bold text-slate-600 uppercase tracking-[0.4em]">Powered by Kimshie AI • Office Manager 2026</p>
    </footer>

    <script>
        const SUPABASE_URL = 'https://hzuafwnxsqkioqkgokbf.supabase.co', 
              SUPABASE_KEY = 'sb_publishable_ADFBXS4OmcbtFjpFfZJ5fg_jlbgBR7W';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const buildingData = {
            rooms: [
                { name: 'Lantai 2 Witel Ruang Colaboration', floor: 2, cap: 40, img: 'https://lh7-rt.googleusercontent.com/formsz/AN7BsVBrW09Yns2HU61cu-3BpFZ-vDfMnrngM6JVJio5agKeNshVS6nSSHXnTaRQAcf2EKzNUnUsEXxNgFOMTUNKlr2JEdhjY2EtWZr7O9R72L-YkYJ_c9QlYEyF3aqFX19IEtJWJlpRkPElsJiDwwLJ5bIYxVj43F-U8dpSvVvNMpG5fox7paNlxiSwEMH7dxVb7sxl95jw8b3af-36=w600?key=nJ46R7ZS1TueXAVPvww5Ig' },
                { name: 'Ruang rapat besar lantai 4', floor: 4, cap: 40, img: 'https://lh7-rt.googleusercontent.com/formsz/AN7BsVBSn0WwzPD3TL528yA8szsE_tQ2uNsiwKjnbH-N0LWSgzp5G0Cz_TJK78OmpIpQ_-OaTgvAsO_lDhpcHQUvJ9LdVi0Wyd5P8egsa1Z5D26PjHKB5YkLzeze7LnvDyuPlX9IPNYgq2vZB4aqIS0a3ngKy7Lwmw_2V8iHd-Qm7N9v763AeS0b1M7MBITI01Uh5lGAJ0E6VPjYsYrL=w600?key=nJ46R7ZS1TueXAVPvww5Ig' },
                { name: 'Lantai 7 Witel Spark room 1', floor: 7, cap: 20, img: 'https://lh7-rt.googleusercontent.com/formsz/AN7BsVBrW09Yns2HU61cu-3BpFZ-vDfMnrngM6JVJio5agKeNshVS6nSSHXnTaRQAcf2EKzNUnUsEXxNgFOMTUNKlr2JEdhjY2EtWZr7O9R72L-YkYJ_c9QlYEyF3aqFX19IEtJWJlpRkPElsJiDwwLJ5bIYxVj43F-U8dpSvVvNMpG5fox7paNlxiSwEMH7dxVb7sxl95jw8b3af-36=w600?key=nJ46R7ZS1TueXAVPvww5Ig' },
                { name: 'Lantai 7 Witel Spark room 2', floor: 7, cap: 16, img: '' },
                { name: 'Lantai 7 Witel Mindspace 2', floor: 7, cap: 6, img: '' }
            ]
        };

        window.onload = () => { renderRooms(); checkAuth(); };

        function renderRooms() {
            const grid = document.getElementById('roomGrid');
            document.getElementById('roomCount').innerText = buildingData.rooms.length;
            
            grid.innerHTML = buildingData.rooms.map(room => `
                <div class="glass-card glass p-8 rounded-super-premium flex flex-col group spring-card border border-white/5">
                    <div class="h-48 rounded-premium overflow-hidden mb-6 relative bg-slate-900 border border-white/10">
                        ${room.img ? 
                            `<img src="${room.img}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">` : 
                            `<div class="w-full h-full flex items-center justify-center bg-gradient-to-br from-slate-800 to-slate-950 opacity-50"><i class="fa-solid fa-building text-4xl text-slate-700"></i></div>`
                        }
                        <div class="absolute top-4 left-4 bg-primary/90 backdrop-blur-md px-4 py-1.5 rounded-xl text-[9px] font-black uppercase tracking-widest shadow-lg border border-white/10">Lantai ${room.floor}</div>
                    </div>
                    <h3 class="text-xl font-black mb-1 tracking-tight">${room.name}</h3>
                    <p class="text-slate-500 text-xs mb-8 flex items-center"><i class="fa-solid fa-users mr-2 text-primary"></i> Kapasitas ${room.cap || 'N/A'} Orang</p>
                    <button onclick="openBooking('${room.name}')" class="mt-auto w-full bg-white/5 hover:bg-primary text-[10px] font-black uppercase py-4 rounded-2xl transition-all tracking-widest border border-white/10 hover:border-transparent hover:shadow-lg hover:shadow-primary/30">Pilih Ruangan <i class="fa-solid fa-arrow-right ml-2 group-hover:translate-x-1 transition-transform"></i></button>
                </div>
            `).join('');
        }

        function openBooking(room) { 
            document.getElementById('bookingContainer').classList.remove('hidden');
            document.getElementById('bookingRoomName').value = room;
            document.getElementById('bookingRoomLabel').innerText = room;
            document.getElementById('bookingContainer').scrollIntoView({ behavior: 'smooth' });
        }

        function closeBooking() { document.getElementById('bookingContainer').classList.add('hidden'); }

        async function handleBookingSubmit(e) { 
            e.preventDefault(); 
            const room = document.getElementById('bookingRoomName').value, 
                  name = document.getElementById('bookingName').value, 
                  wa = document.getElementById('bookingWA').value, 
                  unit = document.getElementById('bookingUnit').value, 
                  date = document.getElementById('bookingDate').value, 
                  start = document.getElementById('bookingStart').value, 
                  end = document.getElementById('bookingEnd').value, 
                  agenda = document.getElementById('bookingAgenda').value; 

            try { 
                const formUrl = "https://docs.google.com/forms/d/e/1FAIpQLScV8k27aPjDgsj4VkwFL1IH_c8_te2KHzk5eFouS27XorZfag/formResponse"; 
                const params = new URLSearchParams(); 
                params.append('entry.1275419724', name); 
                params.append('entry.803108456', wa); 
                params.append('entry.276085607', unit); 
                params.append('entry.905896922', room); 
                params.append('entry.524278036', date); 
                params.append('entry.1846877829', start); 
                params.append('entry.1854871766', end); 
                params.append('entry.109089657', agenda); 

                fetch(formUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: params.toString() }); 
                
                await _supabase.from('office_tickets').insert([{ 
                    subject: `RESERVASI: ${room} - ${agenda}`, 
                    location: room, 
                    status: 'MENUNGGU' 
                }]); 

                alert("Reservasi Berhasil Dikirim!"); 
                closeBooking(); 
            } catch(e) {
                alert("Terjadi kesalahan saat mengirim data.");
            } 
        }

        async function checkAuth() { 
            const { data: { session } } = await _supabase.auth.getSession(); 
            if(session) { 
                document.getElementById('loginBtn').classList.add('hidden'); 
                document.getElementById('userProfile').classList.remove('hidden'); 
                document.getElementById('userInitial').innerText = session.user.email.charAt(0).toUpperCase(); 
            } 
        }
    </script>
</body>
</html>
