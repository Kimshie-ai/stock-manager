<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview Header Baru - Kimshie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,800;1,800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; display: flex; align-items: center; justify-center; height: 100vh; margin: 0; }
        .glow-text {
            background: linear-gradient(to bottom, #0056B3, #00A3FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 86, 179, 0.4));
        }
    </style>
</head>
<body>
    <div class="max-w-4xl w-full text-center px-10">
        <!-- Logo Section -->
        <div class="mb-10 animate-bounce">
            <span class="bg-white text-black px-6 py-3 rounded-2xl font-black italic text-3xl shadow-2xl shadow-white/10">T.K</span>
        </div>

        <!-- Main Title -->
        <h1 class="text-white text-7xl md:text-9xl font-black italic tracking-tighter leading-none mb-6">
            LAPOR <span class="glow-text">FM DDP</span>
        </h1>

        <!-- Subtitle -->
        <div class="inline-block border-t border-white/10 pt-6">
            <p class="text-slate-500 font-black uppercase tracking-[0.5em] text-xs md:text-sm">
                Facility Management <span class="text-primary mx-2">•</span> Divisi Digital Product
            </p>
        </div>
    </div>
</body>
</html>
