<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview Header Portal - Kimshie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,800;1,800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #FDFDFD; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .telkom-gradient-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(238, 30, 36, 0.03) 0%, transparent 70%);
            z-index: -1;
        }
        .highlight-red-gradient {
            background: linear-gradient(135deg, #EE1E24 0%, #B91C1C 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 8px rgba(238, 30, 36, 0.2));
        }
        .logo-box {
            box-shadow: 0 20px 40px -10px rgba(238, 30, 36, 0.15);
        }
    </style>
</head>
<body>
    <div class="telkom-gradient-bg"></div>

    <div class="max-w-5xl w-full text-center px-6">
        <!-- Logo Section -->
        <div class="mb-8 flex justify-center">
            <div class="logo-box relative w-20 h-20 bg-white rounded-[2rem] flex items-center justify-center border border-slate-100 overflow-hidden group">
                <div class="absolute inset-0 bg-red-500/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                <span class="text-3xl font-black italic text-[#EE1E24] tracking-tighter relative z-10">T.K</span>
            </div>
        </div>

        <!-- Main Heading -->
        <div class="relative inline-block">
            <h1 class="text-6xl md:text-8xl font-black italic tracking-tighter leading-[0.9] text-slate-900 mb-4">
                LAPOR <span class="highlight-red-gradient">FM DDP</span>
            </h1>
            <!-- Subtle Accent Line -->
            <div class="absolute -bottom-2 left-0 right-0 h-1.5 bg-[#EE1E24]/10 rounded-full blur-sm"></div>
        </div>

        <!-- Subtitle & Info -->
        <div class="mt-8 space-y-4">
            <p class="text-[10px] md:text-xs font-black uppercase tracking-[0.5em] text-slate-400 italic flex items-center justify-center gap-3">
                <span class="w-2 h-2 rounded-full bg-[#EE1E24] animate-pulse"></span>
                Facility Management • Divisi Digital Product
            </p>
            
            <div class="pt-6 border-t border-slate-100 inline-block">
                <p class="text-[11px] font-bold text-slate-300 uppercase tracking-widest">
                    Digitalizing OPMC <span class="text-[#EE1E24]/30 mx-2">|</span> Telkom Kebayoran
                </p>
            </div>
        </div>
    </div>

    <!-- Background Decoration -->
    <div class="fixed top-10 left-10 w-64 h-64 bg-red-500/5 blur-[100px] rounded-full"></div>
    <div class="fixed bottom-10 right-10 w-64 h-64 bg-blue-500/5 blur-[100px] rounded-full"></div>
</body>
</html>
